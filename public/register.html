            </ul>

            <div class="tab-content" id="pills-tabContent">
                <div class="tab-pane fade show active" id="pills-student" role="tabpanel">
                    <form action="https://el-shaddai-website.onrender.com/submit-form" method="POST">
                        <input type="hidden" name="Form_Type" value="Student Registration">
                        <div class="mb-3">
                            <label for="studentName" class="form-label fw-semibold">Student Name</label>
                            <input type="text" class="form-control bg-light" id="studentName" name="Student_Name" placeholder="Full Name" required>
                        </div>
                        <div class="mb-3">
                            <label for="courseInterest" class="form-label fw-semibold">Course of Interest</label>
                            <select class="form-select bg-light" id="courseInterest" name="Course">
                                <option value="SAT/IGCSE">SAT/IGCSE Prep</option>
                                <option value="WAEC/JAMB">WAEC/JAMB Tutorials</option>
                                <option value="Web Dev">Coding (HTML, CSS, Bootstrap)</option>
                                <option value="App Dev">Mobile App Dev (Flutter)</option>
                                <option value="UI/UX">UI/UX Design</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label for="parentPhone" class="form-label fw-semibold">Parent/Guardian Phone</label>
                            <input type="tel" class="form-control bg-light" id="parentPhone" name="Phone_Number" placeholder="+234..." required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Submit Student Record</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="pills-teacher" role="tabpanel">
                    <!-- ========================================== -->
<!--        TEACHER REGISTRATION FORM           -->
<!-- ========================================== -->
<form action="/submit-form" method="POST">
    
    <!-- Hidden input to label this specifically as a Teacher Registration -->
    <input type="hidden" name="Form_Type" value="Teacher Registration">

    <div style="margin-bottom: 15px;">
        <label for="Applicant_Name">Full Name:</label><br>
        <input type="text" id="Applicant_Name" name="Applicant_Name" required style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
        <label for="Subject">Subject You Want to Teach:</label><br>
        <input type="text" id="Subject" name="Subject" placeholder="e.g., Mathematics, Physics, Coding" required style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
        <label for="CV_Link">Link to your CV (Google Drive, LinkedIn, etc.):</label><br>
        <input type="url" id="CV_Link" name="CV_Link" placeholder="https://..." required style="width: 100%; padding: 8px;">
    </div>

    <button type="submit" style="padding: 10px 20px; background-color: #0d6efd; color: white; border: none; cursor: pointer;">
        Submit Application
    </button>
    
</form>
